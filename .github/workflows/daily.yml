name: daily-update

on:
  push:
    branches: [master]
  schedule:
    - cron: '0 14 * * *'   # UTC 14:00 = 北京时间 22:00 (主)
    - cron: '30 15 * * *'  # UTC 15:30 = 北京时间 23:30 (备份1)
    - cron: '0 17 * * *'   # UTC 17:00 = 北京时间 01:00 (备份2)
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests cloudscraper

      - name: Run 五胆码 prediction
        run: python main.py

      - name: Run 四胆码 prediction
        run: python main_4d.py

      - name: Generate merged page
        run: python generate_merged.py

      - name: Commit update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html predictions.json index_4d.html predictions_4d.json index_merged.html
          git diff --staged --quiet || (git commit -m "auto $(date +%Y-%m-%d)" && git push)

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - uses: actions/deploy-pages@v4
        id: deployment
