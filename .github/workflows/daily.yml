name: daily-update

on:
  push:
    branches: [master]
  schedule:
    # 北京时间 20:00 ~ 02:00 每30分钟一次，共13重保障
    - cron: '0 12 * * *'   # BJS 20:00
    - cron: '30 12 * * *'  # BJS 20:30
    - cron: '0 13 * * *'   # BJS 21:00
    - cron: '30 13 * * *'  # BJS 21:30
    - cron: '0 14 * * *'   # BJS 22:00
    - cron: '30 14 * * *'  # BJS 22:30
    - cron: '0 15 * * *'   # BJS 23:00
    - cron: '30 15 * * *'  # BJS 23:30
    - cron: '0 16 * * *'   # BJS 00:00
    - cron: '30 16 * * *'  # BJS 00:30
    - cron: '0 17 * * *'   # BJS 01:00
    - cron: '30 17 * * *'  # BJS 01:30
    - cron: '0 18 * * *'   # BJS 02:00
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests cloudscraper

      - name: Run 五胆码 prediction
        run: python main.py

      - name: Check for changes
        id: changed
        run: |
          git add index.html predictions.json index_4d.html
          git diff --staged --quiet && echo "has_changes=false" >> $GITHUB_OUTPUT || echo "has_changes=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changed.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "auto $(date +%Y-%m-%d)" && git push

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - uses: actions/deploy-pages@v4
        id: deployment
